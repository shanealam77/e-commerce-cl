<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Products — MyStore</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">🛍️ <span class="store-name">MyStore</span></a>
    <div class="nav-search">
      <span>🔍</span>
      <input type="text" placeholder="Search products..." id="search-input">
      <button class="nav-search-btn">→</button>
    </div>
    <div class="nav-links" id="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/products.html" class="nav-link active">Products</a>
      <a href="/products.html?type=digital" class="nav-link">Digital</a>
      <a href="/products.html?type=affiliate" class="nav-link">Deals</a>
    </div>
    <a href="/cart.html" class="cart-btn">
      🛒 Cart
      <span class="cart-count" id="cart-count" style="display:none">0</span>
    </a>
    <button class="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="page-header">
  <h1 id="page-title">All Products</h1>
  <p id="page-subtitle">Browse our complete collection</p>
  <div class="breadcrumb">
    <a href="/">Home</a> <span>›</span> <span id="breadcrumb-current">Products</span>
  </div>
</div>

<section class="section">
  <div class="container">

    <!-- FILTERS BAR -->
    <div class="filters-bar">
      <div class="filter-group">
        <label>Type:</label>
        <select id="filter-type" onchange="applyFilters()">
          <option value="all">All Types</option>
          <option value="own">Our Products</option>
          <option value="affiliate">Affiliate Deals</option>
          <option value="digital">Digital Downloads</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Category:</label>
        <select id="filter-category" onchange="applyFilters()">
          <option value="all">All Categories</option>
          <option value="Electronics">Electronics</option>
          <option value="Fashion">Fashion</option>
          <option value="Fitness">Fitness</option>
          <option value="Home Decor">Home Decor</option>
          <option value="Digital Products">Digital Products</option>
          <option value="Beauty">Beauty</option>
          <option value="Books">Books</option>
          <option value="Others">Others</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Sort:</label>
        <select id="filter-sort" onchange="applyFilters()">
          <option value="newest">Newest First</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
          <option value="rating">Best Rated</option>
        </select>
      </div>
      <div class="filter-results" id="results-count">Loading...</div>
    </div>

    <!-- SEARCH BAR (Full) -->
    <div style="display:flex;gap:12px;margin-bottom:24px">
      <div style="flex:1;display:flex;align-items:center;gap:8px;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:0 16px">
        <span style="color:var(--text3)">🔍</span>
        <input type="text" id="product-search" placeholder="Search products by name or description..." style="flex:1;border:none;background:none;padding:12px 0;font-size:.95rem;color:var(--text);" oninput="debounceSearch(this.value)">
      </div>
      <button onclick="clearSearch()" style="padding:12px 20px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface);font-weight:600;color:var(--text2);transition:var(--transition)" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">Clear ✕</button>
    </div>

    <!-- CATEGORY TABS -->
    <div class="category-tabs" id="cat-tabs">
      <button class="cat-tab active" data-cat="all">🛍️ All</button>
      <button class="cat-tab" data-cat="Electronics">📱 Electronics</button>
      <button class="cat-tab" data-cat="Fashion">👗 Fashion</button>
      <button class="cat-tab" data-cat="Fitness">🏋️ Fitness</button>
      <button class="cat-tab" data-cat="Home Decor">🏠 Home</button>
      <button class="cat-tab" data-cat="Digital Products">📚 Digital</button>
      <button class="cat-tab" data-cat="Beauty">💄 Beauty</button>
    </div>

    <!-- PRODUCTS GRID -->
    <div class="products-grid" id="products-grid">
      <div class="spinner"></div>
    </div>

    <!-- LOAD MORE -->
    <div style="text-align:center;margin-top:40px" id="load-more-wrap" style="display:none">
      <button id="load-more-btn" onclick="loadMore()" style="padding:12px 36px;border-radius:99px;border:2px solid var(--primary);background:none;color:var(--primary);font-weight:700;font-size:1rem;cursor:pointer;transition:var(--transition)" onmouseover="this.style.background='var(--primary)';this.style.color='#fff'" onmouseout="this.style.background='none';this.style.color='var(--primary)'">
        Load More Products ↓
      </button>
    </div>

  </div>
</section>

<div id="toast-container" class="toast-container"></div>

<script src="/js/main.js"></script>
<script>
let allProducts = [];
let filteredProducts = [];
let displayedCount = 0;
const BATCH_SIZE = 12;
let searchTimeout;

// Read URL params
const urlParams = new URLSearchParams(window.location.search);
const urlType = urlParams.get("type") || "all";
const urlCategory = urlParams.get("category") || "all";
const urlSearch = urlParams.get("search") || "";

async function loadProducts() {
  const grid = document.getElementById("products-grid");
  grid.innerHTML = '<div class="spinner"></div><p class="loading-text">Loading products...</p>';
  try {
    allProducts = await fetchProducts();
    applyFilters(true);
  } catch (e) {
    grid.innerHTML = '<p style="text-align:center;color:var(--danger);padding:60px">❌ Error loading products. Make sure the server is running!</p>';
  }
}

function applyFilters(initial = false) {
  const type = document.getElementById("filter-type").value;
  const category = document.getElementById("filter-category").value;
  const sort = document.getElementById("filter-sort").value;
  const search = document.getElementById("product-search").value.toLowerCase();

  filteredProducts = allProducts.filter(p => {
    const matchType = type === "all" || p.type === type;
    const matchCat = category === "all" || p.category === category;
    const matchSearch = !search || p.name.toLowerCase().includes(search) || p.description.toLowerCase().includes(search);
    return matchType && matchCat && matchSearch;
  });

  // Sort
  if (sort === "price-low") filteredProducts.sort((a, b) => a.price - b.price);
  else if (sort === "price-high") filteredProducts.sort((a, b) => b.price - a.price);
  else if (sort === "rating") filteredProducts.sort((a, b) => b.rating - a.rating);
  else filteredProducts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  document.getElementById("results-count").textContent = `${filteredProducts.length} products found`;
  displayedCount = 0;
  renderBatch(true);
}

function renderBatch(reset = false) {
  const grid = document.getElementById("products-grid");
  const slice = filteredProducts.slice(displayedCount, displayedCount + BATCH_SIZE);
  if (reset) {
    grid.innerHTML = slice.length ? "" : `<div style="text-align:center;padding:80px 0;grid-column:1/-1">
      <div style="font-size:4rem;margin-bottom:16px">🔍</div>
      <h3 style="margin-bottom:10px">No products found</h3>
      <p style="color:var(--text3)">Try changing the filters or search term</p>
    </div>`;
  }
  grid.innerHTML += slice.map((p, i) => renderProductCard(p, (i % BATCH_SIZE) * 0.06)).join("");
  if (typeof initScrollReveal === "function") initScrollReveal();
  displayedCount += slice.length;
  const wrap = document.getElementById("load-more-wrap");
  wrap.style.display = displayedCount < filteredProducts.length ? "block" : "none";
}

function loadMore() { renderBatch(); }

function debounceSearch(val) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => applyFilters(), 400);
}

function clearSearch() {
  document.getElementById("product-search").value = "";
  document.getElementById("filter-type").value = "all";
  document.getElementById("filter-category").value = "all";
  applyFilters();
}

// Category tabs
document.getElementById("cat-tabs").addEventListener("click", e => {
  const tab = e.target.closest(".cat-tab");
  if (!tab) return;
  document.querySelectorAll("#cat-tabs .cat-tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  document.getElementById("filter-category").value = tab.dataset.cat;
  applyFilters();
});

// Apply URL params
document.getElementById("filter-type").value = urlType;
document.getElementById("filter-category").value = urlCategory;
if (urlSearch) {
  document.getElementById("product-search").value = urlSearch;
  document.getElementById("page-title").textContent = `Search: "${urlSearch}"`;
}
if (urlType !== "all") {
  const labels = { digital: "Digital Downloads", affiliate: "Top Deals", own: "Our Products" };
  document.getElementById("page-title").textContent = labels[urlType] || "Products";
}
if (urlCategory !== "all") {
  document.getElementById("page-title").textContent = urlCategory;
  document.querySelectorAll("#cat-tabs .cat-tab").forEach(t => {
    t.classList.toggle("active", t.dataset.cat === urlCategory);
  });
}

loadProducts();
</script>
</body>
</html>
