<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>Product — MyStore</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">🛍️ <span class="store-name">MyStore</span></a>
    <div class="nav-search">
      <span>🔍</span>
      <input type="text" placeholder="Search products...">
      <button class="nav-search-btn">→</button>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/products.html" class="nav-link">Products</a>
      <a href="/products.html?type=digital" class="nav-link">Digital</a>
      <a href="/products.html?type=affiliate" class="nav-link">Deals</a>
    </div>
    <a href="/cart.html" class="cart-btn">🛒 Cart <span class="cart-count" id="cart-count" style="display:none">0</span></a>
    <button class="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="page-header" style="padding:30px 0">
  <div class="breadcrumb">
    <a href="/">Home</a> <span>›</span>
    <a href="/products.html">Products</a> <span>›</span>
    <span id="breadcrumb-name">Loading...</span>
  </div>
</div>

<section>
  <div class="container">
    <!-- LOADING STATE -->
    <div id="loading-state" style="text-align:center;padding:80px">
      <div class="spinner"></div>
      <p class="loading-text">Loading product...</p>
    </div>

    <!-- PRODUCT DETAIL -->
    <div class="product-detail-grid" id="product-detail" style="display:none">
      <!-- Image Side -->
      <div>
        <img id="detail-img" src="" alt="" class="product-detail-img-main" onerror="this.src='https://via.placeholder.com/500?text=No+Image'">
        <div style="display:flex;gap:10px;margin-top:16px" id="img-thumbnails"></div>
      </div>

      <!-- Info Side -->
      <div class="product-detail-info">
        <div class="detail-category" id="detail-cat"></div>
        <h1 class="detail-title" id="detail-title"></h1>

        <div class="detail-rating">
          <span class="stars" id="detail-stars" style="font-size:1.1rem"></span>
          <span id="detail-reviews" style="color:var(--text3);font-size:.9rem"></span>
          <span id="detail-type-badge"></span>
        </div>

        <div class="detail-price">
          <span class="detail-price-current" id="detail-price"></span>
          <span class="detail-price-original" id="detail-orig"></span>
          <span class="detail-price-save" id="detail-save" style="display:none"></span>
        </div>

        <p class="detail-desc" id="detail-desc"></p>

        <!-- Quantity — hide for affiliate -->
        <div class="detail-qty" id="qty-section">
          <label>Quantity:</label>
          <div class="qty-input">
            <button onclick="changeQty(-1)">−</button>
            <span id="qty-val">1</span>
            <button onclick="changeQty(1)">+</button>
          </div>
          <span id="stock-info" style="font-size:.85rem;color:var(--text3)"></span>
        </div>

        <!-- Action Buttons -->
        <div class="detail-actions" id="detail-actions"></div>

        <!-- Meta Info -->
        <div class="detail-meta">
          <div class="detail-meta-row">
            <span>Category:</span><span id="meta-cat"></span>
          </div>
          <div class="detail-meta-row" id="meta-stock-row">
            <span>Availability:</span><span id="meta-stock" style="color:var(--success)">✅ In Stock</span>
          </div>
          <div class="detail-meta-row">
            <span>Product Type:</span><span id="meta-type"></span>
          </div>
        </div>

        <!-- Share Buttons -->
        <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap">
          <button onclick="shareProduct('whatsapp')" style="padding:9px 18px;border-radius:8px;background:#25D366;color:#fff;font-weight:600;font-size:.85rem;border:none;cursor:pointer">💬 Share on WhatsApp</button>
          <button onclick="shareProduct('copy')" style="padding:9px 18px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);font-weight:600;font-size:.85rem;cursor:pointer">🔗 Copy Link</button>
        </div>
      </div>
    </div>

    <!-- RELATED PRODUCTS -->
    <div style="margin-top:60px" id="related-section" style="display:none">
      <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:24px">Related Products</h2>
      <div class="products-grid" id="related-products"></div>
    </div>
  </div>
</section>

<div id="toast-container" class="toast-container"></div>

<script src="/js/main.js"></script>
<script>
let currentProduct = null;
let qty = 1;

const id = new URLSearchParams(window.location.search).get("id");

async function loadProduct() {
  try {
    const res = await fetch(`/api/products/${id}`);
    if (!res.ok) throw new Error("Not found");
    currentProduct = await res.json();
    renderProduct(currentProduct);
    loadRelated(currentProduct.category, currentProduct.id);
  } catch {
    document.getElementById("loading-state").innerHTML = `
      <div style="font-size:4rem;margin-bottom:20px">😕</div>
      <h2>Product not found</h2>
      <a href="/products.html" style="display:inline-block;margin-top:16px;padding:12px 28px;border-radius:99px;background:var(--primary);color:#fff;font-weight:700">← Back to Products</a>`;
  }
}

function renderProduct(p) {
  document.title = `${p.name} — MyStore`;
  document.getElementById("breadcrumb-name").textContent = p.name;

  // Image with reveal animation
  const imgEl = document.getElementById("detail-img");
  imgEl.src = p.image || "https://via.placeholder.com/500?text=No+Image";
  imgEl.alt = p.name;
  imgEl.onerror = () => imgEl.src = "https://via.placeholder.com/500?text=No+Image";
  imgEl.style.opacity = "0";
  imgEl.style.transform = "scale(0.96)";
  imgEl.style.transition = "opacity 0.6s ease, transform 0.6s ease";
  imgEl.onload = () => { imgEl.style.opacity = "1"; imgEl.style.transform = "scale(1)"; };

  document.getElementById("detail-cat").textContent = p.category;
  document.getElementById("detail-title").textContent = p.name;
  document.getElementById("detail-stars").textContent = renderStars(p.rating || 4.5);
  document.getElementById("detail-reviews").textContent = `(${p.reviews || 0} reviews)`;
  document.getElementById("detail-price").textContent = `₹${(p.price || 0).toLocaleString()}`;
  document.getElementById("meta-cat").textContent = p.category;
  document.getElementById("stock-info").textContent = p.stock >= 999 ? "Unlimited" : `${p.stock} in stock`;

  // ✅ DESCRIPTION — always visible, never empty
  const descEl = document.getElementById("detail-desc");
  descEl.textContent = (p.description && p.description.trim())
    ? p.description
    : "Premium quality product. Contact us for more details.";
  descEl.style.display = "block";

  // Price discount
  if (p.originalPrice > p.price) {
    document.getElementById("detail-orig").textContent = `₹${p.originalPrice.toLocaleString()}`;
    const pct = Math.round((1 - p.price / p.originalPrice) * 100);
    const saveEl = document.getElementById("detail-save");
    saveEl.textContent = `Save ${pct}%`;
    saveEl.style.display = "inline-block";
  }

  // Type badge
  const typeNames = { own: "🏪 Our Own Product", affiliate: "🔗 Affiliate Product", digital: "📥 Digital Download" };
  const typeBadgeColors = { own: "var(--success)", affiliate: "#B45309", digital: "var(--primary)" };
  const typeBadge = document.getElementById("detail-type-badge");
  typeBadge.textContent = typeNames[p.type] || p.type;
  typeBadge.style.cssText = `font-size:.77rem;font-weight:700;padding:4px 14px;border-radius:99px;background:rgba(0,0,0,.05);color:${typeBadgeColors[p.type] || "var(--text)"}`;

  document.getElementById("meta-type").textContent = typeNames[p.type] || p.type;

  if (p.stock <= 0) {
    document.getElementById("meta-stock").textContent = "❌ Out of Stock";
    document.getElementById("meta-stock").style.color = "var(--danger)";
  }

  // ✅ ACTION BUTTONS — Affiliate Mode A / Mode B + luxury styling
  const actions = document.getElementById("detail-actions");
  if (p.type === "affiliate") {
    document.getElementById("qty-section").style.display = "none";
    const label = p.affiliateMode === "B" ? "SHOP BEST PRICE 🔗" : "BUY NOW 🔗";
    actions.innerHTML = `
      <a href="${p.affiliateUrl || "#"}" target="_blank" rel="noopener"
         class="btn-buy btn-buy-affiliate" style="padding:15px 34px;font-size:.9rem">
        ${label}
      </a>
      <p style="margin-top:12px;font-size:.77rem;color:var(--text3)">
        🔒 Verified Seller &nbsp;·&nbsp; Secure Checkout
      </p>`;
  } else if (p.type === "digital") {
    actions.innerHTML = `
      <button onclick="addToCartAndGo()" class="btn-buy btn-buy-digital" style="padding:15px 30px;font-size:.9rem">
        📥 DOWNLOAD NOW
      </button>
      <button onclick="addToCartOnly()" class="btn-cart-icon" style="width:52px;height:52px" title="Add to Cart">🛒</button>`;
  } else {
    actions.innerHTML = `
      <button onclick="addToCartAndGo()" class="btn-buy btn-buy-primary" style="padding:15px 32px;font-size:.9rem">
        ADD TO CART
      </button>
      <button onclick="addToCartOnly()" class="btn-buy" style="padding:15px 20px;background:var(--bg2);border:2px solid var(--border);font-size:.85rem">
        + WISHLIST
      </button>`;
  }

  document.getElementById("loading-state").style.display = "none";
  document.getElementById("product-detail").style.display = "grid";

  // Animate right column in with stagger
  document.querySelectorAll(".product-detail-info > *").forEach((el, i) => {
    el.style.opacity = "0";
    el.style.transform = "translateY(24px)";
    el.style.transition = `opacity 0.55s ease ${i * 0.07}s, transform 0.55s ease ${i * 0.07}s`;
    setTimeout(() => { el.style.opacity = "1"; el.style.transform = "none"; }, 50);
  });
}

function changeQty(delta) {
  qty = Math.max(1, Math.min(qty + delta, currentProduct?.stock || 99));
  document.getElementById("qty-val").textContent = qty;
}

function addToCartOnly() {
  if (!currentProduct) return;
  window._productsCache[currentProduct.id] = currentProduct;
  Cart.add(currentProduct, qty);
}

function addToCartAndGo() {
  addToCartOnly();
  setTimeout(() => window.location.href = "/cart.html", 500);
}

async function loadRelated(category, excludeId) {
  const products = await fetchProducts({ category });
  const related = products.filter(p => p.id !== excludeId).slice(0, 4);
  if (related.length) {
    document.getElementById("related-section").style.display = "block";
    document.getElementById("related-products").innerHTML = related.map((p, i) => renderProductCard(p, i * 0.07)).join("");
    if (typeof initScrollReveal === "function") initScrollReveal();
  }
}

function shareProduct(type) {
  const url = window.location.href;
  const name = currentProduct?.name || "Check this out!";
  if (type === "whatsapp") {
    window.open(`https://wa.me/?text=${encodeURIComponent(name + "\n" + url)}`, "_blank");
  } else {
    navigator.clipboard.writeText(url);
    toast("Link copied to clipboard! 🔗", "success");
  }
}

if (!id) { window.location.href = "/products.html"; } else { loadProduct(); }
</script>
<!-- BOTTOM NAV (Mobile) -->
<nav class="bottom-nav" id="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/" class="bottom-nav-item" data-page="home">
      <span>🏠</span><span>Home</span>
    </a>
    <a href="/products.html" class="bottom-nav-item" data-page="products">
      <span>🛍️</span><span>Shop</span>
    </a>
    <a href="/products.html?type=digital" class="bottom-nav-item" data-page="digital">
      <span>📥</span><span>Digital</span>
    </a>
    <a href="/cart.html" class="bottom-nav-item" data-page="cart" style="position:relative">
      <span>🛒</span><span>Cart</span>
      <span class="bottom-nav-cart-badge" id="bnav-cart-count" style="display:none">0</span>
    </a>
  </div>
</nav>
</body>
</html>
